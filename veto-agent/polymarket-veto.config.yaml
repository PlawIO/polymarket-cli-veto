polymarket:
  binaryPath: auto

runtime:
  agentId: ""
  agentIdEnv: VETO_AGENT_ID
  sessionId: ""
  sessionIdEnv: VETO_SESSION_ID
  approvalMode: return

execution:
  simulationDefault: true
  allowLiveTrades: false
  maxCommandTimeoutMs: 15000
  maxOutputBytes: 1048576
  tradeLimits:
    enabled: true
    maxPositionSizeUsd: 500
    dailyVolumeLimitUsd: 1000
  marketAccess:
    enabled: false
    mode: blocklist
    tokens: []
    categories: []
  circuitBreaker:
    enabled: false
    maxConsecutiveLosses: 5
    maxLossRatePercent: 70
    pnlVelocityThresholdUsd: -100
    windowMinutes: 60
    cooldownMinutes: 15

audit:
  enabled: true
  filePath: ./data/audit.jsonl
  maxFileSizeMb: 50

positions:
  enabled: true
  dataFilePath: ./data/positions.json

mcp:
  transport: stdio
  host: 127.0.0.1
  port: 9800
  path: /mcp

veto:
  configDir: ../veto
  policyProfile: defaults
  cloud:
    apiKeyEnv: VETO_API_KEY
  multiSig:
    enabled: false
    minApprovals: 2
    thresholdUsd: 100
    approvalTimeoutMs: 600000
  identity:
    enabled: false
    algorithm: sha256
    agents: []

economic:
  enabled: false
  defaultPayer: ""
  approvedPayers: []
  scopes:
    - session
    - agent
    - category
  cloud:
    baseUrl: https://api.veto.so
    apiKeyEnv: VETO_API_KEY
    timeoutMs: 10000
    cacheTtlMs: 30000

x402:
  enabled: false
  evmPrivateKeyEnv: X402_EVM_PRIVATE_KEY
  tools:
    intelSearch:
      enabled: false
      url: ""
      method: GET
      provider: intel-search
      budgetCategory: research
      maxPriceUsd: 0.05
      payer: research-wallet
      queryParam: q
      marketParam: market
      eventParam: event
      tokenParam: token
      allowedNetworks:
        - eip155:8453
      allowedAssets:
        - USDC
    intelMarketContext:
      enabled: false
      url: ""
      method: GET
      provider: intel-market-context
      budgetCategory: research
      maxPriceUsd: 0.10
      payer: research-wallet
      queryParam: q
      marketParam: market
      eventParam: event
      tokenParam: token
      allowedNetworks:
        - eip155:8453
      allowedAssets:
        - USDC
